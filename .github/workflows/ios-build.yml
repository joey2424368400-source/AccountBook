name: iOS Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      export_method:
        description: '导出方式'
        required: false
        default: 'development'
        type: choice
        options:
          - development
          - ad-hoc
          - app-store

jobs:
  build:
    name: Build & Archive
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Install xcpretty
        run: gem install xcpretty --no-document || true

      - name: Build (Simulator)
        run: |
          set -o pipefail
          xcodebuild build \
            -project AccountBook.xcodeproj \
            -scheme AccountBook \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tee build.log | xcpretty || {
              echo "=== BUILD FAILED (last 100 lines) ==="
              tail -100 build.log
              exit 1
            }

      # --- 打包 .ipa 需要 Apple Developer 账号 ---
      # 以下步骤被注释，配置好签名证书和 Provisioning Profile 后取消注释即可
      #
      # - name: Archive
      #   run: |
      #     xcodebuild archive \
      #       -project AccountBook.xcodeproj \
      #       -scheme AccountBook \
      #       -archivePath ./build/AccountBook.xcarchive \
      #       -destination 'generic/platform=iOS' \
      #       CODE_SIGN_STYLE=Manual \
      #       PROVISIONING_PROFILE_SPECIFIER="${{ secrets.PROVISIONING_PROFILE }}" \
      #       CODE_SIGN_IDENTITY="${{ secrets.CODE_SIGN_IDENTITY }}"
      #
      # - name: Export IPA
      #   run: |
      #     xcodebuild -exportArchive \
      #       -archivePath ./build/AccountBook.xcarchive \
      #       -exportPath ./build/ipa \
      #       -exportOptionsPlist exportOptions.plist
      #
      # - name: Upload IPA
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: AccountBook.ipa
      #     path: ./build/ipa/AccountBook.ipa

      - name: Upload build log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: ~/Library/Logs/DiagnosticReports/
