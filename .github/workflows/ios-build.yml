name: iOS Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      export_method:
        description: '导出方式'
        required: false
        default: 'development'
        type: choice
        options:
          - development
          - ad-hoc
          - app-store

jobs:
  build:
    name: Build & Archive
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build (Simulator)
        run: |
          xcodebuild build \
            -project AccountBook.xcodeproj \
            -scheme AccountBook \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            > build.log 2>&1 || {
              echo "=== BUILD FAILED (last 120 lines) ==="
              tail -120 build.log
              exit 1
            }

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log

      - name: Build Unsigned IPA (Device)
        run: |
          set -o pipefail
          xcodebuild build \
            -project AccountBook.xcodeproj \
            -scheme AccountBook \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            > build-device.log 2>&1 || {
              echo "=== BUILD FAILED (last 120 lines) ==="
              tail -120 build-device.log
              exit 1
            }

          APP_PATH=$(find /Users/runner/Library/Developer/Xcode/DerivedData -name "AccountBook.app" -path "*/Release-iphoneos/*" 2>/dev/null | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: Could not find AccountBook.app"
            exit 1
          fi
          echo "Found app at: $APP_PATH"

          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r AccountBook.ipa Payload
          echo "IPA created: $(ls -lh AccountBook.ipa)"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: AccountBook-unsigned.ipa
          path: AccountBook.ipa
