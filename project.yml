name: AccountBook
options:
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.accountbook.app
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Manual
    SWIFT_VERSION: "5.9"

targets:
  AccountBook:
    type: application
    platform: iOS
    sources:
      - path: .
        type: group
        excludes:
          - project.yml
          - Info.plist
          - exportOptions.plist
          - .git
          - .github
          - "*.xcodeproj"
          - "*.xcworkspace"
    settings:
      base:
        PRODUCT_NAME: AccountBook
        DISPLAY_NAME: 记账
        SUPPORTED_PLATFORMS: iphoneos iphonesimulator
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "1.0.0"
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Info.plist
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UIBackgroundModes: remote-notification
        INFOPLIST_KEY_CFBundleDisplayName: 记账
